server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Long-term caching for hashed assets emitted by VitePress.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # `cleanUrls: true` in VitePress means we serve /foo from /foo.html.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Health endpoint for docker compose / k8s.
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"docs"}';
    }

    # Lightweight security headers — content is fully static.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
